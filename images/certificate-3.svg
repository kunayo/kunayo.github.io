<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="certBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefefe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 证书背景 -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="url(#certBg)" stroke="url(#greenBorder)" stroke-width="3" filter="url(#shadow)"/>

  <!-- 边框装饰 -->
  <rect x="35" y="35" width="330" height="230" rx="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 科技型企业标识 -->
  <rect x="150" y="45" width="100" height="50" rx="8" fill="#dcfce7"/>
  <text x="200" y="78" font-family="sans-serif" font-size="20" fill="#16a34a" text-anchor="middle" font-weight="bold">科小</text>

  <!-- 标题 -->
  <text x="200" y="120" font-family="'Noto Serif SC', serif" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">科技型中小企业</text>

  <!-- 内容文字 -->
  <text x="200" y="160" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#64748b" text-anchor="middle">广东省科技型中小企业认定</text>

  <!-- 入库编号 -->
  <text x="200" y="190" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">入库编号：2024A01234560123</text>

  <!-- 底部信息 -->
  <text x="200" y="225" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">入库日期：2024年04月01日</text>

  <!-- 印章 -->
  <circle cx="320" cy="220" r="30" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.8"/>
  <text x="320" y="218" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">广东省</text>
  <text x="320" y="232" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">科技厅</text>
</svg>
