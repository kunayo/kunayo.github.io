<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="certBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefefe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 证书背景 -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="url(#certBg)" stroke="url(#goldBorder)" stroke-width="3" filter="url(#shadow)"/>

  <!-- 边框装饰 -->
  <rect x="35" y="35" width="330" height="230" rx="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 国徽/徽章占位 -->
  <circle cx="200" cy="70" r="25" fill="#fbbf24" opacity="0.3"/>
  <circle cx="200" cy="70" r="20" fill="none" stroke="#d97706" stroke-width="2"/>
  <text x="200" y="78" font-family="serif" font-size="24" fill="#92400e" text-anchor="middle">★</text>

  <!-- 标题 -->
  <text x="200" y="120" font-family="'Noto Serif SC', serif" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">高新技术企业证书</text>

  <!-- 内容文字 -->
  <text x="200" y="160" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#64748b" text-anchor="middle">证书编号：GR202444004186</text>

  <!-- 底部信息 -->
  <text x="200" y="210" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">颁发日期：2024年01月01日</text>
  <text x="200" y="235" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">有效期：三年</text>

  <!-- 印章 -->
  <circle cx="320" cy="220" r="30" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.8"/>
  <text x="320" y="218" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">广东省</text>
  <text x="320" y="232" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">科技厅</text>
</svg>
