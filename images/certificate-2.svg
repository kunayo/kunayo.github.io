<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="certBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefefe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 证书背景 -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="url(#certBg)" stroke="url(#blueBorder)" stroke-width="3" filter="url(#shadow)"/>

  <!-- 边框装饰 -->
  <rect x="35" y="35" width="330" height="230" rx="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 软件协会LOGO占位 -->
  <rect x="160" y="45" width="80" height="50" rx="4" fill="#dbeafe"/>
  <text x="200" y="78" font-family="sans-serif" font-size="28" fill="#2563eb" text-anchor="middle" font-weight="bold">软协</text>

  <!-- 标题 -->
  <text x="200" y="120" font-family="'Noto Serif SC', serif" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">会员单位证书</text>

  <!-- 内容文字 -->
  <text x="200" y="160" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#64748b" text-anchor="middle">广东省软件行业协会</text>

  <!-- 会员编号 -->
  <text x="200" y="190" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#64748b" text-anchor="middle">会员编号：2024-0123</text>

  <!-- 底部信息 -->
  <text x="200" y="225" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">颁发日期：2024年03月15日</text>

  <!-- 印章 -->
  <circle cx="320" cy="220" r="30" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.8"/>
  <text x="320" y="218" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">软件行业</text>
  <text x="320" y="232" font-family="sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">协会</text>
</svg>
